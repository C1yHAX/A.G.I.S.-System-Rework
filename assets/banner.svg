<svg viewBox="0 0 920 250" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0e1a24"/>
      <stop offset="0.55" stop-color="#0a121a"/>
      <stop offset="1" stop-color="#0b0f14"/>
    </linearGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ffe066"/>
      <stop offset="1" stop-color="#f0b429"/>
    </linearGradient>
    <linearGradient id="wave" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#0fb8ad" stop-opacity="0.1"/>
      <stop offset="0.5" stop-color="#19d3c5" stop-opacity="0.9"/>
      <stop offset="1" stop-color="#0fb8ad" stop-opacity="0.1"/>
    </linearGradient>
    <filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="3" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- panel -->
  <rect x="1" y="1" width="918" height="248" rx="18" fill="url(#bg)"/>
  <rect x="1.5" y="1.5" width="917" height="247" rx="17.5" fill="none" stroke="#1d3a4a" stroke-width="1.5"/>

  <!-- faint hex texture, top-right -->
  <g stroke="#16323f" stroke-width="1.5" fill="none" opacity="0.6">
    <path d="M812,44 l16,9 v18 l-16,9 -16,-9 v-18 z"/>
    <path d="M846,64 l16,9 v18 l-16,9 -16,-9 v-18 z"/>
    <path d="M812,84 l16,9 v18 l-16,9 -16,-9 v-18 z"/>
  </g>

  <!-- emblem: gold ring + cyber-hex node -->
  <g transform="translate(120,125)" filter="url(#glow)">
    <circle r="64" fill="#0a141c" stroke="url(#gold)" stroke-width="4.5"/>
    <circle r="64" fill="none" stroke="#f0b429" stroke-width="1" opacity="0.35"/>
    <!-- hex node -->
    <path d="M0,-36 L31,-18 L31,18 L0,36 L-31,18 L-31,-18 Z" fill="#0d1922" stroke="#fcee0a" stroke-width="3"/>
    <circle r="6.5" fill="#fcee0a"/>
    <!-- circuit stubs -->
    <line x1="6.5" y1="0" x2="31" y2="0" stroke="#fcee0a" stroke-width="2.5"/>
    <line x1="-6.5" y1="0" x2="-31" y2="0" stroke="#fcee0a" stroke-width="2.5"/>
    <circle cx="31" cy="0" r="3.5" fill="#19d3c5"/>
    <circle cx="-31" cy="0" r="3.5" fill="#19d3c5"/>
    <circle cx="0" cy="-36" r="3.5" fill="#19d3c5"/>
    <circle cx="0" cy="36" r="3.5" fill="#19d3c5"/>
  </g>

  <!-- title block -->
  <text x="232" y="118" font-size="62" font-weight="800" letter-spacing="1" fill="#fcee0a">A.G.I.S.</text>
  <text x="236" y="156" font-size="27" font-weight="600" fill="#e8eef2">System <tspan fill="#8aa0ad">(Rework)</tspan></text>
  <text x="237" y="190" font-size="15.5" fill="#8aa0ad">All Game Items Store for Cyberpunk 2077 &#8212; buy anything, no console commands.</text>

  <!-- version pill -->
  <g transform="translate(838,42)">
    <rect x="-52" y="-19" width="70" height="36" rx="18" fill="#7c3aed"/>
    <text x="-17" y="5" font-size="18" font-weight="700" fill="#ffffff" text-anchor="middle">v1.0</text>
  </g>

  <!-- wave -->
  <path d="M70,222 C 210,200 320,240 460,220 S 720,200 852,220" fill="none" stroke="url(#wave)" stroke-width="3" stroke-linecap="round"/>
</svg>
